<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>活字排版工坊</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">本地活字印章排版</p>
          <h1>活字排版工坊</h1>
        </div>
        <div class="top-actions">
          <button id="undoBtn" class="history-btn" title="撤销 (Ctrl+Z)" disabled>↶ 撤销</button>
          <button id="redoBtn" class="history-btn" title="重做 (Ctrl+Y)" disabled>↷ 重做</button>
          <div class="divider-v"></div>
          <button id="templateLibraryBtn" class="gold">版式模板库</button>
          <button id="textLayoutBtn">文本落版</button>
          <button id="proofreadBtn">排版校对中心</button>
          <button id="saveDraftBtn" class="primary">保存草稿</button>
          <button id="exportBtn">导出预览图</button>
          <button id="clearBoardBtn">清空版面</button>
        </div>
      </header>

      <section class="settings-bar" aria-label="版面设置">
        <label>
          作品名
          <input id="workTitle" type="text" placeholder="例：晚风小笺" />
        </label>
        <div class="divider-v"></div>
        <label>
          纸张
          <select id="paperSize">
            <option value="postcard">明信片</option>
            <option value="bookmark">书签</option>
            <option value="square">方形小笺</option>
          </select>
        </label>
        <label>
          方向
          <select id="flowMode">
            <option value="horizontal">横排</option>
            <option value="vertical">竖排</option>
          </select>
        </label>
        <label>
          网格
          <input id="gridGap" type="range" min="4" max="18" value="8" />
        </label>
      </section>

      <section class="workspace">
        <aside class="panel inventory-panel">
          <div class="panel-head">
            <h2>字模库</h2>
            <div class="panel-head-actions">
              <span id="inventoryCount"></span>
              <button id="exportInventoryBtn" class="mini-btn" type="button" title="导出字模库">导出</button>
              <button id="importInventoryBtn" class="mini-btn" type="button" title="导入字模库">导入</button>
              <input id="importFileInput" type="file" accept="application/json,.json" hidden />
            </div>
          </div>
          <form id="typeForm" class="type-form">
            <input id="charInput" maxlength="2" placeholder="字" required />
            <input id="styleInput" placeholder="风格" required />
            <input id="sizeInput" type="number" min="8" max="72" value="24" required />
            <input id="quantityInput" type="number" min="1" max="99" value="3" required />
            <select id="wearInput">
              <option value="新">新</option>
              <option value="微磨">微磨</option>
              <option value="旧痕">旧痕</option>
            </select>
            <button class="primary" type="submit">加入</button>
          </form>
          <div class="filter-row">
            <input id="inventorySearch" type="search" placeholder="搜索字或风格" />
            <select id="styleFilter">
              <option value="all">全部风格</option>
            </select>
          </div>
          <div id="typeList" class="type-list"></div>
        </aside>

        <section class="stage-wrap">
          <div class="pages-bar">
            <div class="pages-tabs" id="pagesTabs"></div>
            <div class="pages-actions">
              <button id="addPageBtn" class="mini-btn" type="button" title="新增页面">+ 新增</button>
              <button id="duplicatePageBtn" class="mini-btn" type="button" title="复制当前页">⧉ 复制</button>
              <button id="renamePageBtn" class="mini-btn" type="button" title="重命名">✎ 改名</button>
              <button id="deletePageBtn" class="mini-btn" type="button" title="删除当前页">× 删除</button>
            </div>
          </div>
          <div class="status-strip">
            <div>
              <strong id="selectedTypeLabel">未选择字模</strong>
              <span>点击字模后，在版面格子中落字，也可拖拽字模到版面。</span>
              <span id="activeTemplateLabel" class="template-label"></span>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
              <button id="clearTemplateBtn" class="mini-btn" type="button" hidden title="清除模板">清除模板</button>
              <div id="shortageBadge" class="badge ok">数量充足</div>
            </div>
          </div>
          <div id="stage" class="stage" aria-label="排版画布"></div>
        </section>

        <aside class="panel right-panel">
          <div class="panel-tabs">
            <button class="panel-tab active" data-right-tab="draft" type="button">草稿与核对</button>
            <button class="panel-tab" data-right-tab="proofread" type="button">排版校对</button>
          </div>

          <div class="right-tab-content" data-right-tab-content="draft">
            <div class="panel-head">
              <h2>草稿与核对</h2>
            </div>
            <div class="usage-summary">
              <div class="usage-summary-item">
                <span class="usage-summary-label">当前页</span>
                <span id="currentPageCount" class="usage-summary-value">0个落字</span>
              </div>
              <div class="usage-summary-item total">
                <span class="usage-summary-label">全作品</span>
                <span id="totalCount" class="usage-summary-value">0个落字</span>
              </div>
            </div>
            <div class="usage-tabs">
              <button class="usage-tab active" data-usage-tab="current" type="button">当前页用量</button>
              <button class="usage-tab" data-usage-tab="total" type="button">全作品用量</button>
            </div>
            <div id="usageList" class="usage-list"></div>
            <div class="divider"></div>
            <h3>已保存草稿</h3>
            <div id="draftList" class="draft-list"></div>
          </div>

          <div class="right-tab-content" data-right-tab-content="proofread" hidden>
            <div class="panel-head">
              <h2>排版校对中心</h2>
              <div class="panel-head-actions">
                <button id="proofreadRefreshBtn" class="mini-btn" type="button">重新检查</button>
              </div>
            </div>
            <div class="proofread-summary" id="proofreadSummary"></div>
            <div class="proofread-issues" id="proofreadIssues"></div>
          </div>
        </aside>
      </section>
    </main>

    <div id="textLayoutModal" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-head">
          <h2>文本落版助手</h2>
          <button id="tlClose" class="mini-btn" type="button">×</button>
        </div>
        <div class="modal-body">
          <label class="tl-input-label">
            输入短句
            <textarea id="tlText" rows="3" placeholder="例：山月风花茶雨"></textarea>
          </label>
          <div class="tl-direction">
            <span>填入方向</span>
            <label class="tl-radio"><input type="radio" name="tlDir" value="horizontal" checked />从左到右</label>
            <label class="tl-radio"><input type="radio" name="tlDir" value="vertical" />从上到下</label>
          </div>
          <button id="tlAnalyze" class="primary" type="button">分析字模</button>
          <div id="tlAnalysis" class="tl-analysis" hidden>
            <h3>字模分析</h3>
            <div id="tlAnalysisContent" class="tl-analysis-content"></div>
          </div>
        </div>
        <div class="modal-foot">
          <button id="tlCancel" type="button">取消</button>
          <button id="tlConfirm" class="primary" type="button" disabled>确认落版</button>
        </div>
      </div>
    </div>

    <div id="importModal" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-head">
          <h2>导入字模库</h2>
          <button id="importClose" class="mini-btn" type="button">×</button>
        </div>
        <div class="modal-body">
          <div id="importSummary" class="import-summary"></div>
          <div id="importErrors" class="import-errors" hidden></div>
          <div class="import-options">
            <h3>导入方式</h3>
            <label class="import-option">
              <input type="radio" name="importMode" value="merge" checked />
              <div>
                <strong>合并到现有字模库</strong>
                <span>保留当前字模，跳过完全重复的条目</span>
              </div>
            </label>
            <label class="import-option">
              <input type="radio" name="importMode" value="overwrite" />
              <div>
                <strong>覆盖当前字模库</strong>
                <span>清空现有字模，替换为导入内容</span>
              </div>
            </label>
          </div>
        </div>
        <div class="modal-foot">
          <button id="importCancel" type="button">取消</button>
          <button id="importConfirm" class="primary" type="button" disabled>确认导入</button>
        </div>
      </div>
    </div>

    <div id="templateLibraryModal" class="modal-overlay" hidden>
      <div class="modal template-modal">
        <div class="modal-head">
          <h2>版式模板库</h2>
          <button id="tlLibraryClose" class="mini-btn" type="button">×</button>
        </div>
        <div class="modal-body">
          <p class="modal-hint">选择模板后，将应用推荐的纸张、方向、网格间距和预留落字位置，不会覆盖字模库。模板应用后仍可继续手动编辑。</p>
          <div id="templateList" class="template-list"></div>
        </div>
        <div class="modal-foot">
          <button id="tlLibraryCancel" type="button">取消</button>
        </div>
      </div>
    </div>

    <div id="exportConfirmModal" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-head">
          <h2>导出前校对提示</h2>
          <button id="exportConfirmClose" class="mini-btn" type="button">×</button>
        </div>
        <div class="modal-body">
          <div id="exportConfirmContent" class="export-confirm-content"></div>
        </div>
        <div class="modal-foot">
          <button id="exportConfirmCancel" type="button">取消导出</button>
          <button id="exportConfirmOk" class="primary" type="button">继续导出</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
